<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💣 炸弹礼物 - 多人联机</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background: #0f0e17;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            min-height: 100vh;
            color: #fffffe;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #1a1a2e;
            border-radius: 28px;
            padding: 20px 16px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        .header h1 { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, #ff8906, #f25f4c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .player-area { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #16162e; padding: 10px 14px; border-radius: 40px; margin-bottom: 16px; }
        .player-area label { color: #a7a9be; font-size: 0.9rem; }
        .player-area input { background: #0f0e17; border: 1px solid #3a3a5a; border-radius: 20px; padding: 6px 12px; color: #fffffe; outline: none; width: 100px; }
        .player-area input:focus { border-color: #ff8906; }
        .player-area .btn-sm { background: #ff8906; border: none; border-radius: 20px; padding: 6px 14px; color: #0f0e17; font-weight: bold; cursor: pointer; }
        .player-area .btn-sm:active { background: #e07c00; }
        .balance { background: #0f0e17; padding: 6px 16px; border-radius: 40px; font-size: 1.1rem; border: 1px solid #ff8906; }
        .balance span { color: #ffd700; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin: 16px 0; }
        .tabs button { flex: 1; padding: 10px 0; border: none; border-radius: 40px; background: #2a2a4a; color: #a7a9be; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .tabs button.active { background: #ff8906; color: #0f0e17; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: #16162e; border-radius: 20px; padding: 18px 16px; margin-bottom: 16px; }
        .card label { font-size: 0.9rem; color: #a7a9be; display: block; margin-bottom: 4px; }
        .card input[type="number"] { width: 100%; padding: 12px; background: #0f0e17; border: 1px solid #3a3a5a; border-radius: 12px; color: #fffffe; font-size: 1.2rem; outline: none; }
        .card input:focus { border-color: #ff8906; }
        .digit-selector { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 10px; }
        .digit-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #3a3a5a; background: #0f0e17; color: #fffffe; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .digit-btn.selected { border-color: #ff8906; background: #ff8906; color: #0f0e17; }
        .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 40px; background: #ff8906; color: #0f0e17; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
        .btn-primary:active { background: #e07c00; }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
        .btn-secondary { padding: 8px 18px; border: none; border-radius: 30px; background: #2a2a4a; color: #fffffe; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-secondary:active { background: #3a3a6a; }
        .gift-list { max-height: 380px; overflow-y: auto; }
        .gift-item { background: #0f0e17; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ff8906; }
        .gift-info { font-size: 0.9rem; }
        .gift-info .sender { color: #ff8906; font-weight: bold; }
        .gift-info .amount { color: #ffd700; }
        .gift-info .bomb { color: #f25f4c; }
        .gift-actions { display: flex; gap: 8px; align-items: center; }
        .badge { background: #2a2a4a; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; color: #a7a9be; }
        .stats { display: flex; justify-content: space-around; background: #16162e; border-radius: 16px; padding: 12px 0; margin: 10px 0 16px; }
        .stat-item { text-align: center; }
        .stat-item .num { font-size: 1.3rem; font-weight: bold; color: #ffd700; }
        .stat-item .label { font-size: 0.7rem; color: #a7a9be; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; padding: 12px 24px; border-radius: 40px; border: 1px solid #ff8906; color: #fffffe; font-weight: bold; z-index: 999; display: none; max-width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .toast.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1a1a2e; border-radius: 28px; padding: 30px 20px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #ff8906; }
        .modal h2 { margin-bottom: 8px; }
        .modal p { color: #a7a9be; margin: 6px 0; }
        .modal .highlight { color: #ffd700; font-weight: bold; }
        .modal .btn-primary { margin-top: 16px; }
        .empty { color: #a7a9be; text-align: center; padding: 30px 0; }
        .small-note { font-size: 0.75rem; color: #6a6a8a; margin-top: 6px; }
        .fee-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: #a7a9be; border-top: 1px solid #2a2a4a; padding-top: 8px; margin-top: 8px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f0e17; }
        ::-webkit-scrollbar-thumb { background: #ff8906; border-radius: 4px; }
        .player-badge { background: #ff8906; color: #0f0e17; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <h1>💣 炸弹礼物</h1>
        <div class="balance">💰 <span id="balanceDisplay">0.00</span></div>
    </div>

    <!-- 玩家管理 -->
    <div class="player-area">
        <label>👤 当前玩家：</label>
        <span id="currentPlayerDisplay" style="font-weight:bold; color:#ff8906;">Guest</span>
        <input type="text" id="playerNameInput" placeholder="输入昵称" value="Player1">
        <button class="btn-sm" id="switchPlayerBtn">切换</button>
        <button class="btn-sm" id="resetBalanceBtn" style="background:#f25f4c;">重置余额</button>
    </div>

    <div class="stats">
        <div class="stat-item"><div class="num" id="sendCount">0</div><div class="label">发包次数</div></div>
        <div class="stat-item"><div class="num" id="grabCount">0</div><div class="label">抢包次数</div></div>
        <div class="stat-item"><div class="num" id="bonusCount">0</div><div class="label">奖励次数</div></div>
    </div>

    <div class="tabs">
        <button class="active" data-tab="sendTab">📤 发红包</button>
        <button data-tab="grabTab">📥 抢红包</button>
    </div>

    <!-- 发红包 -->
    <div id="sendTab" class="tab-content active">
        <div class="card">
            <label>💰 金额 (₹10.00 – ₹10,000.00)</label>
            <input type="number" id="sendAmount" min="10" max="10000" value="100.00" step="0.01">
            <div style="margin-top:12px;">
                <label>💣 炸弹数字 (0-9)</label>
                <div class="digit-selector" id="bombSelector">
                    <!-- 由js生成 -->
                </div>
            </div>
            <button class="btn-primary" id="sendBtn">💥 发送炸弹礼物</button>
            <div class="fee-info">
                <span>📦 固定6个包</span>
                <span>💸 平台抽水: 盈利的5%</span>
            </div>
            <div class="small-note">⚠️ 发包者不能抢自己的红包，每人每包限抢一次</div>
        </div>
        <div class="card" style="background: #0f0e17; border: 1px dashed #3a3a5a;">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:#a7a9be;">
                <span>🎯 连号奖励: 3连₹18, 4连₹66, 5连₹88</span>
                <span>🔢 同号奖励: 3同₹18, 4同₹66, 5同₹88</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:6px; color:#6a6a8a;">
                <span>🏆 抢包10次 → ₹10×10 红包码</span>
                <span>🏆 发包10次 → ₹10×10 红包码</span>
            </div>
        </div>
    </div>

    <!-- 抢红包 -->
    <div id="grabTab" class="tab-content">
        <div class="card" style="padding: 10px 0;">
            <div style="padding: 0 16px 10px; display:flex; justify-content:space-between; align-items:center;">
                <span>📦 待抢红包 (<span id="giftCount">0</span>)</span>
                <button class="btn-secondary" id="refreshGifts" style="padding:4px 14px;">🔄</button>
            </div>
            <div class="gift-list" id="giftList">
                <div class="empty">暂无红包，快去发一个吧！</div>
            </div>
        </div>
    </div>
</div>

<!-- Toast 消息 -->
<div class="toast" id="toast"></div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">🎉 结果</h2>
        <p id="modalBody"></p>
        <button class="btn-primary" id="modalBtn">知道了</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // ============================================================
    // 🔥 Firebase 配置 - 请替换为你的项目配置
    // ============================================================
    const firebaseConfig = {
  	apiKey: "AIzaSyBI58xy2ICo21x91928VCTjijWYHhysDPo",
  	authDomain: "bomb-gift-game-30ba9.firebaseapp.com",
  	databaseURL: "https://bomb-gift-game-30ba9-default-rtdb.firebaseio.com",
  	projectId: "bomb-gift-game-30ba9",
  	storageBucket: "bomb-gift-game-30ba9.firebasestorage.app",
  	messagingSenderId: "433690949590",
  	appId: "1:433690949590:web:a0c8fd3c349ecdbbd55677"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ---------- DOM 引用 ----------
    const $ = id => document.getElementById(id);
    const balanceDisplay = $('balanceDisplay');
    const sendCountEl = $('sendCount');
    const grabCountEl = $('grabCount');
    const bonusCountEl = $('bonusCount');
    const sendAmount = $('sendAmount');
    const bombSelector = $('bombSelector');
    const sendBtn = $('sendBtn');
    const giftList = $('giftList');
    const giftCount = $('giftCount');
    const refreshGifts = $('refreshGifts');
    const toast = $('toast');
    const modalOverlay = $('modalOverlay');
    const modalTitle = $('modalTitle');
    const modalBody = $('modalBody');
    const modalBtn = $('modalBtn');
    const currentPlayerDisplay = $('currentPlayerDisplay');
    const playerNameInput = $('playerNameInput');
    const switchPlayerBtn = $('switchPlayerBtn');
    const resetBalanceBtn = $('resetBalanceBtn');

    let toastTimeout = null;
    let modalCallback = null;

    // ---------- 全局状态 ----------
    let currentPlayer = null;          // 当前玩家名称
    let playersRef = database.ref('players');
    let giftsRef = database.ref('gifts');

    // ---------- 工具函数 ----------
    function showToast(msg, duration = 2500) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function showModal(title, body, cb) {
        modalTitle.textContent = title;
        modalBody.innerHTML = body;
        modalOverlay.classList.add('show');
        modalCallback = cb || null;
    }

    function hideModal() {
        modalOverlay.classList.remove('show');
        if (modalCallback) { modalCallback(); modalCallback = null; }
    }
    modalBtn.addEventListener('click', hideModal);
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) hideModal();
    });

    // ---------- 读取/写入 Firebase 数据 ----------
    function getPlayerRef(name) {
        return playersRef.child(name);
    }

    // ---------- 更新 UI ----------
    function updateUI(playerData) {
        if (!playerData) {
            balanceDisplay.textContent = '0.00';
            sendCountEl.textContent = '0';
            grabCountEl.textContent = '0';
            bonusCountEl.textContent = '0';
            return;
        }
        balanceDisplay.textContent = (playerData.balance || 0).toFixed(2);
        sendCountEl.textContent = playerData.sendCount || 0;
        grabCountEl.textContent = playerData.grabCount || 0;
        bonusCountEl.textContent = playerData.bonusCount || 0;
    }

    // ---------- 监听玩家数据变化 ----------
    function listenPlayer(playerName) {
        // 取消之前的监听
        if (window._playerListener) {
            window._playerListener.off();
        }
        if (!playerName) return;
        const ref = getPlayerRef(playerName);
        const listener = ref.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                updateUI(data);
                currentPlayerDisplay.textContent = playerName;
                // 更新全局当前玩家名
                window.currentPlayerName = playerName;
            } else {
                // 玩家不存在，创建默认数据
                ref.set({
                    balance: 1000,
                    sendCount: 0,
                    grabCount: 0,
                    bonusCount: 0,
                    grabbedGifts: {}
                });
            }
        });
        window._playerListener = listener;
    }

    // ---------- 监听红包列表变化 ----------
    function listenGifts() {
        if (window._giftsListener) {
            window._giftsListener.off();
        }
        const listener = giftsRef.on('value', (snapshot) => {
            const allGifts = snapshot.val();
            renderGiftList(allGifts);
        });
        window._giftsListener = listener;
    }

    // ---------- 渲染红包列表 ----------
    function renderGiftList(allGifts) {
        if (!allGifts) {
            giftCount.textContent = '0';
            giftList.innerHTML = `<div class="empty">暂无可抢红包</div>`;
            return;
        }
        // 转为数组
        const giftsArray = Object.keys(allGifts).map(key => ({ id: key, ...allGifts[key] }));
        // 过滤出可抢的红包：发送者不是当前玩家，且当前玩家未抢过，且有未抢包
        const available = giftsArray.filter(g => {
            if (g.sender === window.currentPlayerName) return false;
            // 检查当前玩家是否已抢过此红包
            const playerData = window._currentPlayerData || {};
            const grabbed = playerData.grabbedGifts || {};
            if (grabbed[g.id]) return false;
            // 检查是否有未抢包
            return g.packets.some(p => !p.grabbed);
        });
        giftCount.textContent = available.length;

        if (available.length === 0) {
            giftList.innerHTML = `<div class="empty">暂无可抢红包</div>`;
            return;
        }

        let html = '';
        for (const gift of available) {
            const remaining = gift.packets.filter(p => !p.grabbed).length;
            html += `
                <div class="gift-item">
                    <div class="gift-info">
                        <div><span class="sender">${gift.sender}</span> 的炸弹礼物</div>
                        <div>总额 <span class="amount">₹${gift.amount.toFixed(2)}</span> · 炸弹数字 <span class="bomb">${gift.bombDigit}</span></div>
                        <div style="font-size:0.75rem; color:#6a6a8a;">剩余 ${remaining} 个包</div>
                    </div>
                    <div class="gift-actions">
                        <button class="btn-secondary" onclick="grabGift('${gift.id}')" style="padding:6px 14px;">💥 抢</button>
                    </div>
                </div>
            `;
        }
        giftList.innerHTML = html;
    }

    // ---------- 发送红包 ----------
    function sendGift() {
        const amount = parseFloat(sendAmount.value);
        if (isNaN(amount) || amount < 10 || amount > 10000) {
            showToast('⚠️ 请输入金额 (10.00 – 10000.00)');
            return;
        }
        if (amount < 6) {
            showToast('⚠️ 金额至少6卢比 (6个包)');
            return;
        }
        // 读取当前玩家数据
        const playerName = window.currentPlayerName;
        if (!playerName) { showToast('请先切换玩家'); return; }
        const playerRef = getPlayerRef(playerName);
        // 先读取玩家余额
        playerRef.once('value', (snap) => {
            const data = snap.val();
            if (!data) { showToast('玩家数据不存在'); return; }
            const balance = data.balance || 0;
            if (balance < amount) { showToast('❌ 余额不足！'); return; }

            const bombDigit = stateSelectedBomb; // 全局存储选中的炸弹数字

            // 生成6个包
            let packetAmounts;
            try {
                packetAmounts = splitAmount(amount, 6);
            } catch(e) {
                showToast('⚠️ ' + e.message);
                return;
            }

            const packets = packetAmounts.map(amt => ({
                amount: amt,
                grabbed: false,
                grabber: null
            }));

            const newGift = {
                sender: playerName,
                amount: amount,
                bombDigit: bombDigit,
                packets: packets,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            // 写入红包
            const newGiftRef = giftsRef.push();
            newGiftRef.set(newGift).then(() => {
                // 更新发送者余额和发包次数
                playerRef.update({
                    balance: balance - amount,
                    sendCount: (data.sendCount || 0) + 1
                }).then(() => {
                    showToast(`✅ 发送成功！总额 ₹${amount.toFixed(2)}，炸弹数字 ${bombDigit}`);
                    switchTab('grabTab');
                    // 检查发包次数奖励 (在更新后触发)
                    checkSendReward(playerName);
                });
            }).catch(err => {
                showToast('❌ 发送失败：' + err.message);
            });
        });
    }

    // ---------- 拆分金额 ----------
    function splitAmount(total, count = 6) {
        let totalCents = Math.round(total * 100);
        if (totalCents < count) throw new Error('金额太小，至少' + count + '卢比');
        let cents = [];
        let remain = totalCents;
        for (let i = 0; i < count - 1; i++) {
            let max = remain - (count - i - 1);
            let min = 1;
            let val = Math.floor(Math.random() * (max - min + 1)) + min;
            cents.push(val);
            remain -= val;
        }
        cents.push(remain);
        for (let i = cents.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cents[i], cents[j]] = [cents[j], cents[i]];
        }
        return cents.map(c => c / 100);
    }

    // ---------- 抢红包 ----------
    window.grabGift = function(giftId) {
        const playerName = window.currentPlayerName;
        if (!playerName) { showToast('请先切换玩家'); return; }

        // 读取红包数据
        const giftRef = giftsRef.child(giftId);
        giftRef.once('value', (snap) => {
            const gift = snap.val();
            if (!gift) { showToast('❌ 红包不存在'); return; }

            // 检查是否自己发的
            if (gift.sender === playerName) {
                showToast('❌ 你不能抢自己发的红包！');
                return;
            }

            // 检查是否有未抢包
            const availableIndexes = [];
            gift.packets.forEach((p, idx) => {
                if (!p.grabbed) availableIndexes.push(idx);
            });
            if (availableIndexes.length === 0) {
                showToast('❌ 红包已被抢完');
                return;
            }

            // 读取玩家数据
            const playerRef = getPlayerRef(playerName);
            playerRef.once('value', (playerSnap) => {
                const playerData = playerSnap.val();
                if (!playerData) { showToast('玩家数据不存在'); return; }
                // 检查是否已抢过此红包
                if (playerData.grabbedGifts && playerData.grabbedGifts[giftId]) {
                    showToast('❌ 你已经抢过这个红包了！');
                    return;
                }
                // 检查余额
                const required = Math.ceil(gift.amount * 1.8 * 100) / 100;
                if ((playerData.balance || 0) < required) {
                    showToast(`❌ 余额不足，需要 ₹${required.toFixed(2)} (1.8倍)`);
                    return;
                }

                // 随机选一个包
                const randomIdx = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
                const packet = gift.packets[randomIdx];
                const packetAmount = packet.amount;
                const intPart = Math.floor(packetAmount);
                const digit = intPart % 10;
                const isBomb = (digit === gift.bombDigit);

                // 准备更新操作（原子性使用 transaction，但为简化我们使用一次更新，但可能冲突，这里使用 transaction 处理抢包）
                // 使用 transaction 保证原子性
                giftRef.transaction((currentGift) => {
                    if (!currentGift) return currentGift;
                    // 再次检查该包是否已被抢
                    if (currentGift.packets[randomIdx].grabbed) {
                        return; // 放弃更新
                    }
                    // 标记包已抢
                    currentGift.packets[randomIdx].grabbed = true;
                    currentGift.packets[randomIdx].grabber = playerName;
                    return currentGift;
                }, (error, committed, snapshot) => {
                    if (error) {
                        showToast('抢包失败，请重试');
                        return;
                    }
                    if (!committed) {
                        showToast('该包已被抢走，请刷新重试');
                        return;
                    }
                    // 成功抢到，处理余额和奖励
                    const updatedGift = snapshot.val();
                    // 计算赔付
                    let resultMsg = '';
                    let balanceChange = 0;
                    if (isBomb) {
                        const payout = Math.round(gift.amount * 1.8 * 100) / 100;
                        const profit = payout - gift.amount;
                        const fee = Math.round(profit * 0.05 * 100) / 100;
                        const senderGain = payout - fee;
                        // 更新玩家余额（抢包者扣款，发送者加款）
                        const senderRef = getPlayerRef(gift.sender);
                        playerRef.update({
                            balance: (playerData.balance || 0) - payout,
                            grabCount: (playerData.grabCount || 0) + 1,
                            [`grabbedGifts/${giftId}`]: true
                        });
                        senderRef.update({
                            balance: firebase.database.ServerValue.increment(senderGain)
                        });
                        resultMsg = `💥 踩到炸弹！<br>包金额 ₹${packetAmount.toFixed(2)}，尾数 ${digit} 等于炸弹数字 ${gift.bombDigit}。<br>你赔付 ₹${payout.toFixed(2)} 给 ${gift.sender}。<br>${gift.sender} 获得 ₹${senderGain.toFixed(2)} (已扣5%平台费)`;
                    } else {
                        // 未踩炸弹：抢包者获得该包金额
                        playerRef.update({
                            balance: (playerData.balance || 0) + packetAmount,
                            grabCount: (playerData.grabCount || 0) + 1,
                            [`grabbedGifts/${giftId}`]: true
                        });
                        resultMsg = `🎉 安全！<br>包金额 ₹${packetAmount.toFixed(2)}，尾数 ${digit} 不等于炸弹数字 ${gift.bombDigit}。<br>你获得了 ₹${packetAmount.toFixed(2)}`;
                    }
                    // 处理额外奖励（同号/连号）
                    processGrabReward(playerName, digit);
                    // 检查抢包次数奖励
                    checkGrabReward(playerName);
                    showModal('💣 抢包结果', resultMsg);
                    // 刷新UI（监听会自动更新）
                });
            });
        });
    };

    // ---------- 额外奖励逻辑（与之前类似，但使用Firebase更新） ----------
    // 全局历史存储（为了简便，不存储在数据库，仅本地）
    let grabHistory = []; // 存储 { player, digit }

    function processGrabReward(player, digit) {
        grabHistory.push({ player, digit });
        if (grabHistory.length > 20) grabHistory.shift();
        const myHistory = grabHistory.filter(h => h.player === player).slice(-5);
        if (myHistory.length < 3) return;
        const digits = myHistory.map(h => h.digit);
        let same = 0;
        for (let i = digits.length - 1; i >= 0; i--) {
            if (digits[i] === digit) same++;
            else break;
        }
        let seq = 0;
        if (digits.length >= 2) {
            let last = digits[digits.length - 1];
            for (let i = digits.length - 2; i >= 0; i--) {
                if (digits[i] === last - 1) { seq++; last = digits[i]; }
                else break;
            }
        }
        let reward = 0, rewardType = '';
        if (same >= 5) { reward = 88; rewardType = '5同'; }
        else if (same >= 4) { reward = 66; rewardType = '4同'; }
        else if (same >= 3) { reward = 18; rewardType = '3同'; }
        else if (seq >= 5) { reward = 88; rewardType = '5连'; }
        else if (seq >= 4) { reward = 66; rewardType = '4连'; }
        else if (seq >= 3) { reward = 18; rewardType = '3连'; }
        if (reward > 0) {
            const playerRef = getPlayerRef(player);
            playerRef.update({
                balance: firebase.database.ServerValue.increment(reward),
                bonusCount: firebase.database.ServerValue.increment(1)
            });
            showToast(`🎁 ${player} 获得 ${rewardType} 奖励！+₹${reward}`);
        }
    }

    function checkGrabReward(player) {
        const playerRef = getPlayerRef(player);
        playerRef.once('value', (snap) => {
            const data = snap.val();
            if (!data) return;
            const count = data.grabCount || 0;
            if (count > 0 && count % 10 === 0) {
                const bonus = 100;
                playerRef.update({
                    balance: firebase.database.ServerValue.increment(bonus),
                    bonusCount: firebase.database.ServerValue.increment(1)
                });
                showToast(`🏆 ${player} 抢包${count}次！获得 ₹${bonus} 红包码奖励`);
            }
        });
    }

    function checkSendReward(player) {
        const playerRef = getPlayerRef(player);
        playerRef.once('value', (snap) => {
            const data = snap.val();
            if (!data) return;
            const count = data.sendCount || 0;
            if (count > 0 && count % 10 === 0) {
                const bonus = 100;
                playerRef.update({
                    balance: firebase.database.ServerValue.increment(bonus),
                    bonusCount: firebase.database.ServerValue.increment(1)
                });
                showToast(`🏆 ${player} 发包${count}次！获得 ₹${bonus} 红包码奖励`);
            }
        });
    }

    // ---------- 炸弹数字选择器 ----------
    let stateSelectedBomb = 0;
    function initBombSelector() {
        bombSelector.innerHTML = '';
        for (let i = 0; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'digit-btn' + (i === stateSelectedBomb ? ' selected' : '');
            btn.textContent = i;
            btn.dataset.digit = i;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.digit-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                stateSelectedBomb = parseInt(btn.dataset.digit);
            });
            bombSelector.appendChild(btn);
        }
    }

    // ---------- Tab切换 ----------
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`.tabs button[data-tab="${tabId}"]`).classList.add('active');
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
            switchTab(btn.dataset.tab);
        });
    });

    refreshGifts.addEventListener('click', () => {
        // 刷新列表（监听已自动更新，无需额外操作）
        showToast('已刷新');
    });

    // ---------- 玩家切换 ----------
    function switchPlayer() {
        const name = playerNameInput.value.trim();
        if (!name) { showToast('请输入昵称'); return; }
        // 设置当前玩家
        window.currentPlayerName = name;
        listenPlayer(name);
        // 同时获取玩家数据，并保存到全局以备抢包使用
        getPlayerRef(name).once('value', (snap) => {
            const data = snap.val();
            window._currentPlayerData = data || { balance: 1000, sendCount: 0, grabCount: 0, bonusCount: 0, grabbedGifts: {} };
        });
        showToast(`已切换到 ${name}`);
    }

    switchPlayerBtn.addEventListener('click', switchPlayer);
    playerNameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') switchPlayer();
    });

    // 重置余额（仅当前玩家）
    resetBalanceBtn.addEventListener('click', () => {
        const player = window.currentPlayerName;
        if (!player) { showToast('请先切换玩家'); return; }
        const ref = getPlayerRef(player);
        ref.update({
            balance: 1000,
            sendCount: 0,
            grabCount: 0,
            bonusCount: 0,
            grabbedGifts: {}
        });
        showToast('余额已重置为 ₹1000');
    });

    // ---------- 发送按钮 ----------
    sendBtn.addEventListener('click', sendGift);

    // ---------- 初始化 ----------
    initBombSelector();

    // 默认玩家：从输入框读取
    const defaultName = playerNameInput.value.trim() || 'Player1';
    window.currentPlayerName = defaultName;
    listenPlayer(defaultName);
    listenGifts();

    // 加载玩家数据
    getPlayerRef(defaultName).once('value', (snap) => {
        window._currentPlayerData = snap.val() || { balance: 1000, sendCount: 0, grabCount: 0, bonusCount: 0, grabbedGifts: {} };
    });

    // 定期刷新（无需额外操作，监听已实时更新）

    console.log('🔥 Firebase 多人联机版已启动！');
</script>
